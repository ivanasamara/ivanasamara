<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ivana Samara</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    :root{
      --bg:#0f0f1a;
      --card:#1b1b2f;
      --text:#ffffff;
      --accent:#ff4fd8;
    }
    .light{
      --bg:#f5f5f5;
      --card:#ffffff;
      --text:#111;
      --accent:#ff4fd8;
    }

    body{ margin:0; font-family: Arial; background:var(--bg); color:var(--text); transition:0.3s; }
    .container{ max-width:1100px; margin:auto; padding:20px; }

    .banner{
      height:320px;
      border-radius:20px;
      background-size:cover;
      background-position:center;
      display:flex;
      align-items:flex-end;
      padding:20px;
      animation: fadeIn 1s ease;
    }

    .title{ font-size:34px; font-weight:bold; }
    .subtitle{ opacity:0.8; }

    .toggle{
      position:fixed;
      top:15px;
      right:15px;
      background:var(--card);
      padding:10px;
      border-radius:10px;
      cursor:pointer;
    }

    .bio-btn{
      display:block;
      text-align:center;
      background:var(--accent);
      padding:15px;
      border-radius:15px;
      margin:20px 0;
      color:#fff;
      text-decoration:none;
      font-weight:bold;
      animation: pulse 2s infinite;
    }

    .section{ margin-top:40px; }

    .carousel{
      display:flex;
      overflow-x:auto;
      gap:15px;
      scroll-snap-type:x mandatory;
    }

    .card{
      min-width:220px;
      background:var(--card);
      padding:15px;
      border-radius:15px;
      text-align:center;
      scroll-snap-align:start;
      transition:0.3s;
    }

    .card:hover{ transform:scale(1.05); }

    .card img{ width:100%; border-radius:10px; }

    .social{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .social a{
      background:var(--card);
      padding:10px 15px;
      border-radius:10px;
      text-decoration:none;
      color:var(--text);
      display:flex;
      align-items:center;
      gap:8px;
      transition:0.3s;
    }

    .social img{
      width:20px;
      height:20px;
    }

    .social a:hover{ background:var(--accent); color:#fff; }

    footer{ text-align:center; margin-top:50px; opacity:0.6; }

    @keyframes fadeIn{
      from{ opacity:0; transform:translateY(20px); }
      to{ opacity:1; transform:translateY(0); }
    }

    @keyframes pulse{
      0%{ transform:scale(1); }
      50%{ transform:scale(1.05); }
      100%{ transform:scale(1); }
    }

  </style>
</head>
<body :class="theme">
  <div id="app"></div>

<script>
const data = {
  name:"Ivana Samara",
  title:"Influencer Digital",
  banner:"https://via.placeholder.com/1200x400",
  bioLink:"#",
  products:[
    {name:"Tônico Laranja Poderoso", image:"https://goold.shop/_next/image?url=https%3A%2F%2Ffirebasestorage.googleapis.com%2Fv0%2Fb%2Fgold-spell.firebasestorage.app%2Fo%2Fproducts%252F6018029a-38ef-412f-8e7d-039a088a41a3%252Fe28380c9-f4c1-4938-9522-5e4e84c0a12b%3Falt%3Dmedia%26token%3Deaec6a16-8d1c-4611-b735-fc806d26bdd5&w=1200&q=75", link:"https://pay.goold.club/aff/M7LKWO/UH4QZD35"},
    {name:"Alisei 250ml - By Fioterapia", image:"https://goold.shop/_next/image?url=https%3A%2F%2Ffirebasestorage.googleapis.com%2Fv0%2Fb%2Fgold-spell.firebasestorage.app%2Fo%2Fproducts%252F3f1bc705-d11e-4417-a607-a0b419618625%252Fc941428a-1702-44f3-8022-10b5c5b6664e%3Falt%3Dmedia%26token%3D1bcb7052-fc50-4d17-88e0-2477b36e1eb1&w=1200&q=75", link:"https://pay.goold.club/aff/ANTK1P/UH4QZD35"},
    {name:"Shampoo Laranja Poderoso", image:"https://goold.shop/_next/image?url=https%3A%2F%2Ffirebasestorage.googleapis.com%2Fv0%2Fb%2Fgold-spell.firebasestorage.app%2Fo%2Fproducts%252F331e5b9d-f167-4747-a24b-7673775cd510%252Fbb136d5c-1070-4603-87e0-296bc96db1c0%3Falt%3Dmedia%26token%3D87ea8ec0-fb62-48f6-b8c5-6d05fad6538d&w=1200&q=75", link:"https://pay.goold.club/aff/OAMD16/UH4QZD35"},
    {name:"Condy Laranja Poderoso", image:"https://goold.shop/_next/image?url=https%3A%2F%2Ffirebasestorage.googleapis.com%2Fv0%2Fb%2Fgold-spell.firebasestorage.app%2Fo%2Fproducts%252F66682edc-42ae-47cc-b420-b22603459d4c%252Fb0102e05-8b71-4b5b-82b4-15f706b5da13%3Falt%3Dmedia%26token%3D5eab82b7-f829-4af5-ba95-b5f16f2d8e0b&w=1200&q=75", link:"https://pay.goold.club/aff/1UYWHJ/UH4QZD35"},
    {name:"Liso Ético", image:"https://goold.shop/_next/image?url=https%3A%2F%2Ffirebasestorage.googleapis.com%2Fv0%2Fb%2Fgold-spell.firebasestorage.app%2Fo%2Fproducts%252Fef3e64a2-5f0c-4324-a402-f5ec1468de7a%252F1b19de28-c009-499e-a433-221df711672c%3Falt%3Dmedia%26token%3D4f8e7ddf-797f-43a4-be32-afe646dc2ed2&w=1200&q=75", link:"https://pay.goold.club/aff/NDPFYC/UH4QZD35"}  
  ],
  socials:[
    {name:"Instagram", icon:"https://cdn-icons-png.flaticon.com/512/2111/2111463.png", link:"https://www.instagram.com/ivana_samara_oficial"},
    {name:"TikTok", icon:"https://cdn-icons-png.flaticon.com/512/3046/3046126.png", link:"https://www.tiktok.com/@ivanasamara130"},
    {name:"YouTube", icon:"https://cdn-icons-png.flaticon.com/512/1384/1384060.png", link:"https://www.youtube.com/@Ivana.Samara"}
  ]
}

const { createApp } = Vue;

createApp({
  data(){
    return{ data, theme:'dark' }
  },
  methods:{
    toggleTheme(){
      this.theme = this.theme === 'dark' ? 'light' : 'dark'
      document.body.className = this.theme
    }
  },
  mounted(){ document.body.className = this.theme },
  template:`
  <div class='container'>

    <div class='toggle' @click='toggleTheme'>🌙 / ☀️</div>

    <div class='banner' :style="{backgroundImage:'url('+data.banner+')'}">
      <div>
        <div class='title'>{{data.name}}</div>
        <div class='subtitle'>{{data.title}}</div>
      </div>
    </div>

    <a class='bio-btn' :href='data.bioLink' target='_blank'>🔗 Link na Bio</a>

    <div class='section'>
      <h2>Produtos que uso</h2>
      <div class='carousel'>
        <div class='card' v-for='p in data.products'>
          <img :src='p.image'>
          <h3>{{p.name}}</h3>
          <a :href='p.link' target='_blank'>Ver</a>
        </div>
      </div>
    </div>

    <div class='section'>
      <h2>Redes Sociais</h2>
      <div class='social'>
        <a v-for='s in data.socials' :href='s.link' target='_blank'><img :src='s.icon'> {{s.name}}</a>
      </div>
    </div>

    <footer>
      © 2026 - Desenvolvido por <a href='https://github.com/BlackMix' target='_blank'>Mix Dev</a>
    </footer>

  </div>
  `
}).mount('#app')
</script>
</body>
</html>
